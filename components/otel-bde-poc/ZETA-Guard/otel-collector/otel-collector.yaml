apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: vsdm2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:latest
        command: ["/otelcol-contrib", "--config=/etc/otel-collector-config.yaml"]
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: otel-collector-config-vol
          mountPath: /etc/otel-collector-config.yaml
          subPath: otel-collector-config.yaml
        ports:
        - containerPort: 4317 # OTLP gRPC
          name: otlp-grpc
        - containerPort: 4318 # OTLP HTTP
          name: otlp-http
        env:
        - name: GEMATIK_SIEM_ACCESS_TOKEN # <----- Neue Umgebungsvariable für gematik SIEM
          valueFrom:
            secretKeyRef:
              name: gematik-siem-access-token
              key: access-token
      volumes: # Hinzugefügter Volumes-Abschnitt
      - name: otel-collector-config-vol
        configMap:
          name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-svc
  namespace: vsdm2
spec:
  selector:
    app: otel-collector
  ports:
  - protocol: TCP
    port: 4317
    targetPort: 4317
    name: otlp-grpc
  - protocol: TCP
    port: 4318
    targetPort: 4318
    name: otlp-http
  - protocol: TCP  # <----- Add this port definition
    port: 9090      # <----- Prometheus exporter port
    targetPort: 9090 # <----- Target port in the container
    name: prometheus # <----- Name for this port (optional, but good practice)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: vsdm2
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    exporters:
      prometheus:
        endpoint: "0.0.0.0:9090"
      otlp/jaeger:
        endpoint: "jaeger-svc:4317"
        tls:
          insecure: true
      otlp/bde:
        endpoint: "bde-collector-svc:4317"
        tls:
          insecure: true
      otlp/gematik-siem: # <----- Exporter für gematik SIEM
        endpoint: "default.main.jolly-morse-ztibejl.cribl.cloud:4317"
        headers:  # <----- Access Token als Header
          "Authorization": "Bearer ${env:GEMATIK_SIEM_ACCESS_TOKEN}" # <----- Access Token als Bearer Token im Header
      debug:
        verbosity: normal

    processors:
      filter/product-info-logs: # <----- Filter für product_info LOGS (geändert zu logs)
        error_mode: ignore
        logs: # <----- Filtert Logs anstatt Metriken
          log_record: # <----- Filter für Log Records
            - 'body == "product_info"' # <----- Filterbedingung für name Attribut
      filter/siem-event-logs: # <----- Filter für siem_event LOGS (geändert zu logs)
        error_mode: ignore
        logs: # <----- Filtert Logs anstatt Metriken
          log_record: # <----- Filter für Log Records
            - 'body == "siem_event"' # <----- Filterbedingung für name Attribut
      filter/bde-traces:
        error_mode: ignore
        traces:
          span:
            - IsMatch(resource.attributes["service.name"], "rs-vsdm2-app-svc")
      batch:

    connectors:
      spanmetrics:
        histogram:
          explicit:
            buckets: [100us, 1ms, 2ms, 6ms, 10ms, 100ms, 250ms]
        dimensions:
          - name: http.method
            default: GET
          - name: http.status_code
          - name: http.route
        exemplars:
          enabled: true
        exclude_dimensions: ['status.code']
        dimensions_cache_size: 1000
        aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
        metrics_flush_interval: 15s
        metrics_expiration: 60m
        events:
          enabled: true
          dimensions:
            - name: exception.type
            - name: exception.message
        resource_metrics_key_attributes:
          - service.name
          - telemetry.sdk.language
          - telemetry.sdk.name

    service:
      #telemetry: # internal otel-collector metrics
      #  metrics:
      #    level: detailed
      #  logs:
      #    level: debug
      pipelines:
        traces/all: # <----- Pipeline für alle Traces
          receivers: [otlp]
          processors: [batch]
          exporters: [spanmetrics, debug, otlp/jaeger]
        traces/bde: # <----- Pipeline für BDE (gefiltert)
          receivers: [otlp]
          processors: [filter/bde-traces, batch]
          exporters: [otlp/bde]
        metrics/all: # <----- Beibehalten, verarbeitet aber keine Logs mehr
          receivers: [spanmetrics, otlp]
          processors: [batch]
          exporters: [prometheus, debug]
        #metrics/gematik-siem: # <----- Beibehalten, verarbeitet aber keine Logs mehr
        #  receivers: [otlp]
        #  processors: [batch]
        #  exporters: [otlp/gematik-siem]
        logs/all: # <----- Pipeline für alle Logs
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        logs/product-info: # <----- NEUE Pipeline für product_info LOGS
          receivers: [otlp]
          processors: [filter/product-info-logs, batch] # <----- Log Filter eingefügt
          exporters: [debug, otlp/bde] # <----- Exporter für Logs
        logs/siem-event: # <----- NEUE Pipeline für siem_event LOGS
          receivers: [otlp]
          processors: [filter/siem-event-logs, batch] # <----- Log Filter eingefügt
          exporters: [debug, otlp/gematik-siem] # <----- Exporter für Logs